name: Archivio sagre

# L'API pubblica solo le sagre future: quando una finisce, sparisce. Questo job
# la cattura prima che succeda e la mette in archivio, così la sua pagina resta
# viva e indicizzata. Va eseguito almeno una volta al giorno, o le sagre che
# finiscono nel frattempo le perdiamo per sempre.
on:
  schedule:
    - cron: "0 3 * * *" # ogni notte alle 03:00 UTC
  workflow_dispatch: # e a mano, dalla tab Actions

# Serve per poter committare l'archivio aggiornato.
permissions:
  contents: write

jobs:
  aggiorna:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scarica l'archivio aggiornato dal sito
        run: |
          curl --fail --silent --show-error --max-time 60 \
            https://sagramanije.it/api/archivio \
            -o /tmp/archivio.json

      - name: Aggiorna il file solo se le sagre sono cambiate
        id: confronto
        run: |
          python3 <<'PY' >> "$GITHUB_OUTPUT"
          import json, sys

          scaricato = json.load(open("/tmp/archivio.json"))
          if not isinstance(scaricato.get("sagre"), list) or not scaricato["sagre"]:
              sys.exit("archivio vuoto o malformato: non tocco niente")

          vecchio = json.load(open("data/archivio-sagre.json"))

          # Confronto per id, ignorando l'ordine e soprattutto il campo
          # "aggiornato": quello cambia a ogni esecuzione e da solo farebbe
          # scattare un commit ogni notte anche senza sagre nuove.
          def per_id(d):
              return {s["id"]: s for s in d["sagre"]}

          vecchie = per_id(vecchio)
          scaricate = per_id(scaricato)

          # L'archivio può solo crescere o correggere dati di sagre già viste:
          # se il sito/API non restituisce più un id già committato, lo teniamo.
          unite = {**vecchie, **scaricate}
          nuovo = {
              **scaricato,
              "sagre": sorted(unite.values(), key=lambda s: (s.get("data_inizio") or "9999-12-31", s["id"])),
          }

          if per_id(vecchio) == per_id(nuovo):
              print("cambiato=no")
              print(f"nota=nessuna sagra nuova ({len(nuovo['sagre'])} in archivio)")
          else:
              aggiunte = sorted(set(scaricate) - set(vecchie))
              corrette = sum(
                  1
                  for id_sagra, sagra in scaricate.items()
                  if id_sagra in vecchie and vecchie[id_sagra] != sagra
              )
              json.dump(nuovo, open("data/archivio-sagre.json", "w"))
              print("cambiato=si")
              print(f"nota={len(vecchio['sagre'])} -> {len(nuovo['sagre'])} sagre; nuove={len(aggiunte)}, corrette={corrette}")
          PY

      - name: Riepilogo
        run: echo "${{ steps.confronto.outputs.nota }}"

      - name: Committa l'archivio
        if: steps.confronto.outputs.cambiato == 'si'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/archivio-sagre.json
          git commit -m "[data] aggiornato archivio sagre"
          git push
